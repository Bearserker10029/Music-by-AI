<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music by AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 1rem;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #a0a0a0;
        }

        .error {
            text-align: center;
            padding: 50px;
            color: #e94560;
        }

        .albums-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .album {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .album:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.2);
        }

        .album-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .album-title {
            font-size: 1.3rem;
            color: #e94560;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .album-title::before {
            content: '♪';
            font-size: 1.5rem;
        }

        .album-buttons {
            display: flex;
            gap: 8px;
        }

        .album-btn {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: #fff;
            transition: background 0.2s;
        }

        .album-btn:hover {
            background: rgba(233, 69, 96, 0.5);
        }

        .album-btn.hidden {
            display: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: rgba(26, 26, 46, 0.95);
            border-radius: 16px;
            padding: 25px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(233, 69, 96, 0.3);
            position: relative;
        }

        .modal-title {
            font-size: 1.3rem;
            color: #e94560;
            margin-bottom: 15px;
            padding-right: 30px;
        }

        .modal-text {
            color: #ccc;
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
        }

        .modal-close:hover {
            background: rgba(233, 69, 96, 0.5);
        }

        .track {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .track:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .track.playing {
            background: rgba(233, 69, 96, 0.3);
            border: 1px solid rgba(233, 69, 96, 0.5);
        }

        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.1);
        }

        .play-btn::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 10px solid white;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            margin-left: 3px;
        }

        .track.playing .play-btn {
            background: linear-gradient(135deg, #ff6b6b, #e94560);
        }

        .track-name {
            flex: 1;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-playing {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-top: 1px solid rgba(233, 69, 96, 0.3);
        }

        .np-info {
            flex: 1;
        }

        .np-title {
            color: #e94560;
            font-weight: bold;
        }

        .np-album {
            color: #888;
            font-size: 0.85rem;
        }

        .np-controls {
            display: flex;
            gap: 15px;
        }

        .np-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            position: relative;
        }

        .np-btn:hover {
            transform: scale(1.1);
        }

        .np-btn.prev::after,
        .np-btn.next::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
        }

        .np-btn.prev::after {
            border-right: 12px solid white;
        }

        .np-btn.next::after {
            border-left: 12px solid white;
        }

        .np-btn.play::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-4px);
            border-left: 14px solid white;
            border-top: 9px solid transparent;
            border-bottom: 9px solid transparent;
        }

        .np-btn.pause::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-130%);
            width: 6px;
            height: 18px;
            background: white;
            border: none;
            border-radius: 2px;
            box-shadow: 12px 0 0 white;
        }

        .np-btn.shuffle::after {
            content: '';
            width: 16px;
            height: 16px;
            background: linear-gradient(45deg,
                    transparent 30%, white 30%, white 40%, transparent 40%,
                    transparent 50%, white 50%, white 60%, transparent 60%,
                    transparent 70%, white 70%, white 80%, transparent 80%);
        }

        .progress-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #888;
            margin-top: 5px;
        }

        audio {
            display: none;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <header>
        <h1>Music by AI</h1>
        <p class="subtitle">Created with MiniMax music-2.6 model</p>
    </header>

    <div class="loading" id="loading">Loading music...</div>
    <div class="error hidden" id="error"></div>
    <div class="albums-container hidden" id="albums"></div>

    <div class="now-playing hidden" id="nowPlaying">
        <div class="np-info">
            <div class="np-title" id="npTitle">-</div>
            <div class="np-album" id="npAlbum">-</div>
        </div>
        <div class="np-controls">
            <button class="np-btn shuffle" id="shuffleBtn" title="Shuffle"></button>
            <button class="np-btn prev" id="prevBtn" title="Previous"></button>
            <button class="np-btn play" id="playPauseBtn" title="Play/Pause"></button>
            <button class="np-btn next" id="nextBtn" title="Next"></button>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-close" id="modalClose">×</div>
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-text" id="modalText"></div>
        </div>
    </div>

    <script>
        const REPO_OWNER = 'Bearserker10029';
        const REPO_NAME = 'Music-by-AI';
        const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;

        let allTracks = [];
        let currentIndex = -1;
        let isPlaying = false;
        let isShuffled = false;
        let shuffledOrder = [];
        let originalOrder = [];

        const audio = document.getElementById('audio');
        const albumsContainer = document.getElementById('albums');
        const loading = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const nowPlaying = document.getElementById('nowPlaying');
        const npTitle = document.getElementById('npTitle');
        const npAlbum = document.getElementById('npAlbum');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalClose = document.getElementById('modalClose');
        const modalTitle = document.getElementById('modalTitle');
        const modalText = document.getElementById('modalText');

        async function fetchMusic() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Failed to fetch repository');

                const contents = await response.json();
                const folders = contents.filter(item => item.type === 'dir' && !item.name.startsWith('.'));

                const albumsData = [];

                for (const folder of folders) {
                    const folderResponse = await fetch(`${API_URL}/${encodeURIComponent(folder.name)}`);
                    if (!folderResponse.ok) continue;

                    const files = await folderResponse.json();
                    const mp3Files = files
                        .filter(file => file.name.endsWith('.mp3'))
                        .map(file => file.name);
                    const hasStyles = files.some(file => file.name === 'styles.md');
                    const hasLyrics = files.some(file => file.name === 'lyrics.md');

                    if (mp3Files.length > 0) {
                        albumsData.push({
                            name: folder.name,
                            tracks: mp3Files.sort(),
                            hasStyles,
                            hasLyrics
                        });
                    }
                }

                albumsData.sort((a, b) => a.name.localeCompare(b.name));
                renderAlbums(albumsData);
                buildTrackList(albumsData);

            } catch (err) {
                loading.classList.add('hidden');
                errorEl.classList.remove('hidden');
                errorEl.textContent = 'Error loading music. Please refresh the page.';
                console.error(err);
            }
        }

        function renderAlbums(albumsData) {
            loading.classList.add('hidden');
            albumsContainer.classList.remove('hidden');

            albumsData.forEach(album => {
                const div = document.createElement('div');
                div.className = 'album';
                div.innerHTML = `
                    <div class="album-header">
                        <div class="album-title">${album.name}</div>
                        <div class="album-buttons">
                            <button class="album-btn ${album.hasStyles ? '' : 'hidden'}" data-album="${album.name}" data-type="styles" title="Styles">S</button>
                            <button class="album-btn ${album.hasLyrics ? '' : 'hidden'}" data-album="${album.name}" data-type="lyrics" title="Lyrics">L</button>
                        </div>
                    </div>
                `;

                album.tracks.forEach(track => {
                    const trackDiv = document.createElement('div');
                    trackDiv.className = 'track';
                    const trackName = track.replace('.mp3', '').replace(/\+/g, ' ');
                    trackDiv.dataset.album = album.name;
                    trackDiv.dataset.track = track;
                    trackDiv.innerHTML = `
                        <button class="play-btn"></button>
                        <span class="track-name">${trackName}</span>
                    `;
                    trackDiv.addEventListener('click', () => playTrack(album.name, track));
                    div.appendChild(trackDiv);
                });

                albumsContainer.appendChild(div);
            });
        }

        function buildTrackList(albumsData) {
            allTracks = albumsData.flatMap(album =>
                album.tracks.map(track => ({
                    album: album.name,
                    track,
                    path: `${album.name}/${track}`
                }))
            );
            originalOrder = [...allTracks];
            shuffledOrder = [...allTracks];
        }

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function toggleShuffle() {
            isShuffled = !isShuffled;
            shuffleBtn.style.opacity = isShuffled ? '1' : '0.5';
            if (isShuffled) {
                shuffledOrder = shuffleArray(allTracks);
            } else {
                shuffledOrder = [...originalOrder];
            }
        }

        function getTrackAtIndex(index) {
            return isShuffled ? shuffledOrder[index] : allTracks[index];
        }

        function playTrack(albumName, trackName) {
            const track = allTracks.find(t => t.album === albumName && t.track === trackName);
            if (!track) return;

            currentIndex = allTracks.indexOf(track);
            if (isShuffled) {
                shuffledOrder = shuffleArray(allTracks.filter(t => t !== track));
                shuffledOrder.unshift(track);
            }
            audio.src = track.path;
            audio.play();
            isPlaying = true;
            updateUI();
        }

        function updateUI() {
            if (currentIndex < 0) return;

            const track = isShuffled ? shuffledOrder[currentIndex] : allTracks[currentIndex];
            npTitle.textContent = track.track.replace('.mp3', '').replace(/\+/g, ' ');
            npAlbum.textContent = track.album;
            nowPlaying.classList.remove('hidden');
            playPauseBtn.classList.remove('play');
            playPauseBtn.classList.add('pause');

            document.querySelectorAll('.track').forEach(t => {
                t.classList.toggle('playing',
                    t.dataset.album === track.album && t.dataset.track === track.track);
            });
        }

        function togglePlay() {
            if (currentIndex < 0) return;
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
            } else {
                audio.play();
                isPlaying = true;
            }
            playPauseBtn.classList.toggle('play', !isPlaying);
            playPauseBtn.classList.toggle('pause', isPlaying);
        }

        function prevTrack() {
            if (currentIndex > 0) {
                currentIndex--;
                const track = isShuffled ? shuffledOrder[currentIndex] : allTracks[currentIndex];
                audio.src = track.path;
                if (isPlaying) audio.play();
                updateUI();
            }
        }

        function nextTrack() {
            if (currentIndex < allTracks.length - 1) {
                currentIndex++;
                const track = isShuffled ? shuffledOrder[currentIndex] : allTracks[currentIndex];
                audio.src = track.path;
                if (isPlaying) audio.play();
                updateUI();
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function openModal(title, content) {
            modalTitle.textContent = title;
            modalText.textContent = content;
            modalOverlay.classList.add('active');
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
        }

        async function loadMarkdown(folderName, type) {
            const title = type === 'styles' ? `${folderName} - Styles` : `${folderName} - Lyrics`;
            try {
                const response = await fetch(`${API_URL}/${encodeURIComponent(folderName)}/${type}.md`);
                if (!response.ok) throw new Error('File not found');
                const content = await response.text();
                openModal(title, content);
            } catch (err) {
                openModal(title, `${type === 'styles' ? 'Styles' : 'Lyrics'} file not found.`);
            }
        }

        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('album-btn') && !e.target.classList.contains('hidden')) {
                const albumName = e.target.dataset.album;
                const type = e.target.dataset.type;
                loadMarkdown(albumName, type);
            }
        });

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        modalClose.addEventListener('click', closeModal);

        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = `${percent}%`;
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });

        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('ended', nextTrack);

        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        });

        playPauseBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);
        shuffleBtn.addEventListener('click', toggleShuffle);

        shuffleBtn.style.opacity = '0.5';
        fetchMusic();

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Escape') {
                closeModal();
            } else if (e.code === 'Space' && currentIndex >= 0) {
                e.preventDefault();
                togglePlay();
            }
        });
    </script>
</body>

</html>
